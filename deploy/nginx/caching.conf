proxy_cache_path /var/cache/nginx/static_cache levels=1:2 keys_zone=static_cache:100m inactive=7d;
proxy_cache_path /var/cache/nginx/api_cache levels=1:2 keys_zone=api_cache:50m inactive=1h;

location /_next/static/ {
    proxy_cache static_cache;
    proxy_cache_valid 200 365d;
    proxy_pass http://ui_backend;
}

location /api/health {
    proxy_cache api_cache;
    proxy_cache_valid 200 30s;
    proxy_pass http://api_backend/health;
}
