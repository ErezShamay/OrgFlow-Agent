services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
    networks:
      - orgflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2

  ui:
    build:
      context: orgflow-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    networks:
      - orgflow-net
    depends_on:
      api:
        condition: service_healthy
    deploy:
      replicas: 2

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.automation.scheduler"]
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
    networks:
      - orgflow-net
    depends_on:
      api:
        condition: service_healthy
    deploy:
      replicas: 1

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/caching.conf:/etc/nginx/conf.d/caching.conf:ro
    networks:
      - orgflow-net
    depends_on:
      - api
      - ui

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - orgflow-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - orgflow-net
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

networks:
  orgflow-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
