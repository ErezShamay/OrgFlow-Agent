name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -c constraints.txt
      - name: Verify imports
        run: python -c "import app.main"

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orgflow-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orgflow-ui/package-lock.json
      - run: npm ci
      - run: npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -c constraints.txt
      - name: Run tests
        run: pytest tests/ -q --ignore=tests/manual_test_ai_enrichment.py

  frontend-tests:
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: orgflow-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orgflow-ui/package-lock.json
      - run: npm ci
      - run: npm test

  docker-build-api:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile -t orgflow-api:latest .

  docker-build-ui:
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build UI image
        run: docker build -f orgflow-ui/Dockerfile -t orgflow-ui:latest orgflow-ui

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-ui]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy staging placeholder"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-ui]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy production placeholder"
